name: MLC remote-run test

permissions:
  contents: read

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/test-mlc-remote-run.yml'
      - 'mlc/**'
      - 'docs/install/**'
      - '!**.md'

jobs:
  test_remote_run_localhost:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install mlcflow
      run: |
        python -m pip install --upgrade pip
        python -m pip install .

    - name: Pull automation repo
      run: |
        mlc pull repo mlcommons@mlperf-automations --checkout=dev

    - name: Set up passwordless SSH to localhost
      run: |
        ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
        cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys

        # Start sshd if not running
        sudo systemctl start ssh || sudo service ssh start || true

        # Accept localhost host key
        ssh-keyscan -H localhost >> ~/.ssh/known_hosts 2>/dev/null

        # Verify SSH works
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 localhost "echo 'SSH to localhost works'"

    - name: Test 1 - remote-run detect-os via mlcrr
      run: |
        mlcrr detect-os \
          --remote_host=localhost \
          --remote_ssh_key_file=~/.ssh/id_ed25519 \
          --remote_skip_host_verify=yes \
          --remote_python_venv=$HOME/.mlcflow_venv

    - name: Test 2 - remote-run with tags
      run: |
        mlc remote-run script --tags=detect,os \
          --remote_host=localhost \
          --remote_ssh_key_file=~/.ssh/id_ed25519 \
          --remote_skip_host_verify=yes \
          --remote_python_venv=$HOME/.mlcflow_venv

    - name: Test 3 - remote-docker help (smoke test)
      run: |
        mlcrd --help | grep -q "remote-docker"

    - name: Test 4 - remote-experiment help (smoke test)
      run: |
        mlcre --help | grep -q "remote-experiment"
